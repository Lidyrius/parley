name: windows-build

on:
  push:
    branches: [main]
    paths: ['windows/**', '.github/workflows/windows-build.yml']
    tags: ['win-v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (win-x64, self-contained single file)
        run: dotnet publish windows/Parley.Win.csproj -c Release -r win-x64 -o publish

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath Parley-win-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Parley-win-x64
          path: Parley-win-x64.zip

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/win-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create $env:GITHUB_REF_NAME Parley-win-x64.zip
          --title "Parley Windows $env:GITHUB_REF_NAME"
          --notes "Prebuilt Windows app - install via windows/install.ps1"
